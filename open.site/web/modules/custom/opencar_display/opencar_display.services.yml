services:
  opencar_display.trajet_stats_presenter:
    class: Drupal\opencar_display\Service\TrajetStatsPresenter
    arguments: ['@date.formatter']
  opencar_display.trajet_chart_data_builder:
    class: Drupal\opencar_display\Service\TrajetChartDataBuilder
    arguments: ['@opencar_core.track_point_repository']
  opencar_display.trajet_map_data_builder:
    class: Drupal\opencar_display\Service\TrajetMapDataBuilder
  opencar_display.trajet_gallery_builder:
    class: Drupal\opencar_display\Service\TrajetGalleryBuilder
    arguments: ['@entity_type.manager', '@file_url_generator']
